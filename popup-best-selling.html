    <div style="display: flex; align-items: center; gap: 10px; margin: 8px 0;">
        <label for="pu_deldate" style="font-size: 14px; padding-left: 5px;">Do you want these delivered when?</label>
        <input id="pu_deldate" type="date" placeholder="Enter Delivery Date">
    </div>

    <!-- <script src="script.js"></script> -->

    <script>
        (function () {
        // Delivery days mapping for each area
        const deliveryDays = {
            "": 0,
            "NCR / Metro Manila": "Same Day (Lalamove / GrabExpress)",
            "Luzon": "Same Day (Lalamove / GrabExpress) or 3-5 days (LBC / J&T)",
            "Visayas": "3-14 days (LBC / J&T)",
            "Mindanao": "3-14 days (LBC / J&T)",
        };

        // Rush fee table (14 to 3 days): shorter lead time means higher fee.
        const rushFeeTable = [
            { days: 14, amount: 300 },
            { days: 13, amount: 320 },
            { days: 12, amount: 320 },
            { days: 11, amount: 350 },
            { days: 10, amount: 350 },
            { days: 9, amount: 400 },
            { days: 8, amount: 450 },
            { days: 7, amount: 500 },
            // { days: 6, amount: 700 },
            // { days: 5, amount: 750 },
            // { days: 4, amount: 800 },
            // { days: 3, amount: 850 }
        ];

        // Discount table: add/update codes here when needed.
        const discountTable = [
            { code: 'SAVE50', amount: 50 },
            { code: 'WELCOME100', amount: 100 },
            { code: 'LOYAL200', amount: 200 }
        ];

        function getDiscountByCode(rawCode) {
            const enteredCode = (rawCode || '').trim().toUpperCase();
            if (!enteredCode) {
                return { code: '', amount: 0 };
            }

            const matched = discountTable.find(item => item.code.toUpperCase() === enteredCode);
            if (!matched) {
                return { code: enteredCode, amount: 0 };
            }

            return { code: matched.code, amount: matched.amount };
        }

        function getDaysFromToday(dateValue) {
            if (!dateValue) {
                return null;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const selectedDate = new Date(`${dateValue}T00:00:00`);
            const msPerDay = 1000 * 60 * 60 * 24;
            return Math.ceil((selectedDate - today) / msPerDay);
        }

        function getRushFee(daysFromToday) {
            if (daysFromToday === null) {
                return { amount: 0, label: "₱0" };
            }

            if (daysFromToday > 14) {
                return { amount: 0, label: `₱0 (${daysFromToday} days)` };
            }

            const matchedRule = rushFeeTable.find(rule => rule.days === daysFromToday);
            if (!matchedRule) {
                return { amount: 0, label: "₱0" };
            }

            return {
                amount: matchedRule.amount,
                label: `₱${matchedRule.amount} (${matchedRule.days} days)`
            };
        }

        function computeTotal() {
            const qty = parseInt(document.getElementById('pu_ttl_amt').value) || 0;
            const price = parseFloat('${price}');
            const deliveryDateValue = document.getElementById('pu_deldate').value;
            const discountCode = document.getElementById('disc_code').value;
            let addOnTotal = 0;
            const baseTotal = qty * price;
            const daysFromToday = getDaysFromToday(deliveryDateValue);
            const rushFee = getRushFee(daysFromToday);
            const discount = getDiscountByCode(discountCode);
            const rushFeeRow = document.getElementById('rush_fee_comp');
            const discountRow = document.getElementById('discount_comp');
            const addOnRow = document.getElementById('add_on_comp');
            const hasDiscountInput = discountCode.trim().length > 0;

            document.getElementById('amt_comp_value').textContent = `₱${price} x ${qty} = ₱${baseTotal}`;
            document.getElementById('discount_value').textContent = discount.amount > 0
                ? `- ₱${discount.amount} (${discount.code})`
                : '₱0';
            document.getElementById('rush_fee_value').textContent = rushFee.label;
            discountRow.style.display = hasDiscountInput ? 'flex' : 'none';
            rushFeeRow.style.display = rushFee.amount > 0 ? 'flex' : 'none';

            // Calculate add-on costs
            const addOnCheckboxes = document.querySelectorAll('#add_ons input[type="checkbox"]:checked');
            addOnCheckboxes.forEach(checkbox => {
                const amount = parseFloat(checkbox.getAttribute('data-amount')) || 0;
                const isFixed = checkbox.hasAttribute('data-fixed');
                if (isFixed) {
                    addOnTotal += amount;
                } else {
                    addOnTotal += amount * qty;
                }
            });

            document.getElementById('add_on_value').textContent = `+ ₱${addOnTotal}`;
            addOnRow.style.display = addOnTotal > 0 ? 'flex' : 'none';

            const ttl = Math.max(0, baseTotal + addOnTotal + rushFee.amount - discount.amount);
            document.getElementById('total').textContent = ttl;
        }

        function updateDeliveryDays() {
            const location = document.getElementById('pu_delivery_area').value;
            const days = deliveryDays[location] || 0;
            document.getElementById('days').textContent = days;
        }

        document.getElementById('pu_ttl_amt').addEventListener('input', computeTotal);
        document.getElementById('pu_deldate').addEventListener('change', computeTotal);
        document.getElementById('disc_code').addEventListener('input', computeTotal);
        document.getElementById('pu_delivery_area').addEventListener('change', updateDeliveryDays);
        computeTotal();

        function openCheckoutPopup() {
            const qty = parseInt(document.getElementById('pu_ttl_amt').value) || 0;
            const price = parseFloat('${price}');
            const deliveryArea = document.getElementById('pu_delivery_area').value;
            const deliveryDays = document.getElementById('days').textContent;
            const total = document.getElementById('total').textContent;
            const deliveryDate = document.getElementById('pu_deldate').value;
            const discountCode = document.getElementById('disc_code').value;
            const discount = getDiscountByCode(discountCode);
            const hasDiscountInput = discountCode.trim().length > 0;
            const daysFromToday = getDaysFromToday(deliveryDate);
            const rushFee = getRushFee(daysFromToday);
            const baseTotal = qty * price;
            let addOnTotal = 0;

            // Collect add-ons
            const addons = [];
            const addOnCheckboxes = document.querySelectorAll('#add_ons input[type="checkbox"]:checked');
            addOnCheckboxes.forEach(checkbox => {
                const label = checkbox.parentElement.textContent.trim();
                const amount = checkbox.getAttribute('data-amount');
                const isFixed = checkbox.hasAttribute('data-fixed');
                const amountNum = parseFloat(amount) || 0;

                if (isFixed) {
                    addOnTotal += amountNum;
                } else {
                    addOnTotal += amountNum * qty;
                }

                addons.push({ name: label, amount: amount, fixed: isFixed });
            });

            // Prepare data to pass to checkout popup
            const checkoutData = {
                bimg: '${bimg}',
                name: '${name}',
                price: '${price}',
                qty: qty,
                deliveryArea: deliveryArea,
                deliveryDays: deliveryDays,
                deliveryDate: deliveryDate,
                priceBreakdownText: `₱${price} x ${qty} = ₱${baseTotal}`,
                hasDiscountInput: hasDiscountInput,
                discountCode: discount.code,
                discountAmount: discount.amount,
                addOnAmount: addOnTotal,
                rushFeeAmount: rushFee.amount,
                rushFeeText: rushFee.label,
                total: total,
                addons: addons
            };

            // Store data in localStorage
            localStorage.setItem('checkoutData', JSON.stringify(checkoutData));

            // Open order form page first before checkout summary.
            window.open('order-form.html', 'checkoutPopup', 'width=500,height=760');
        }

        // Expose handlers used by inline onclick/onchange attributes.
        window.computeTotal = computeTotal;
        window.updateDeliveryDays = updateDeliveryDays;
        window.openCheckoutPopup = openCheckoutPopup;
    })();

    </script>

    <div id="pu_est_comp" >
        <div>

        <div style="padding: 0 0 0 20px ;">
            <p id="amt_comp" style="display: flex; justify-content: space-between; margin: 0 20px 5px 0;">

            <p style="margin: 0;"> Estimated Delivery: </p>
