<!DOCTYPE html>
<html lang="en">
<div style="display: flex; align-items: center; margin-bottom: 12px;">
    <div
        style="width: 150px; height: 150px; background-image: url(${bimg}); background-size: contain; background-repeat: no-repeat; border-radius: 8px;">
    </div>
    <h3 style="margin-left: 12px;">${name}</h3>
</div>
<h4>-------- Estimated Computation ---------</h4>

<input type="text" placeholder="Enter quantity" id="qty"
    style="width: 280px; padding: 8px; margin-bottom: 2px; border: 1px solid #ccc; border-radius: 4px;">

<p>Price: ₱${price}</p>
<p>Total: ₱<span id="total">0</span></p>

<!-- <button onclick="addToCart(12); document.querySelector('.overlay').parentNode.removeChild(document.querySelector('.overlay'));" style="margin-top: 12px; width: 100%; padding: 10px; background: #ffc6a8; border: none; border-radius: 8px; color: white; cursor: pointer;">Add to Cart</button> -->

<label>Number 1: <input type="number" id="num1" value="0"></label>
<label>Number 2: <input type="number" id="num2" value="0"></label>

<!-- Display result -->
<p>Result: <span class="result" id="result">0</span></p>

<script>
// Function to compute sum
function computeSum() {
    // Get values and convert to numbers
    const val1 = parseFloat(document.getElementById('num1').value) || 0;
    const val2 = parseFloat(document.getElementById('num2').value) || 0;

    // Calculate sum
    const sum = val1 + val2;

    // Display result
    document.getElementById('result').textContent = sum;
}

// Attach event listeners for real-time calculation
document.getElementById('num1').addEventListener('input', computeSum);
document.getElementById('num2').addEventListener('input', computeSum);

// Initial calculation
computeSum();
</script>

</html>
