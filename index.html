<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Favors PH 🧸</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div id="header_box">
        <p id="header_cap">All rights reserved © 2026</p>
        <img id="headerLogo" src="img/icon/headerLogo.gif">
        
        <!-- <div class="cart">
            🛒 <span id="cart-count">0</span> items - $<span id="cart-total">0</span>
        </div> -->
        <!-- <button id="toggleViewBtn" class="view-toggle">Mobile View</button> -->
        </div>
    </header>

    <!-- BEST selling section -->
    <p id="bs_prod" onclick="window.scrollTo({top: 0, behavior: 'smooth'});" ></p>
    <div id="bestSelling" class="bestSelling"></div>

    
    <!-- Price filter -->
    <section class="priceSearch" onclick="window.scrollTo({top: 368, behavior: 'smooth'});" style="cursor: pointer;">
        <label for="minPrice">Min Price: </label>
        <input type="number" id="minPrice" min="0" placeholder="0" style="width:210px; height: 5px;">
        <label for="maxPrice">Max Price: </label>
        <input type="number" id="maxPrice" min="0" placeholder="Any" style="width:150px; height: 5px;">
        <button id="priceFilterBtn" style="border-radius:10px;">Filter</button>
    </section>

    <!-- Category search -->
    <section class="controls" onclick="window.scrollTo({top: 368, behavior: 'smooth'});" style="cursor: pointer;">
        <input type="text" id="search" placeholder="Search cute things..." style="height: 5px;">
        <div id="filters" class="filters"></div>
    </section>



    <!-- prducts section -->
    <section id="products" class="products"></section>

    <footer>
        <p>Party Favors | Souvenirs | Gifts</p>
        <div>Made with 💖 for cute souvenir lovers</div>
        <!-- <div><img class="fb_logo" src="img/icon/fblogo.png" alt="fblogo"><a href="https://www.facebook.com/Simplyfavorsph">Simplyfavorsph</a></div> -->
        
    <!-- <button onclick="showPopup('<h3>Best Selling Product</h3><p>Wet wipes in can</p><p>₱65</p>')">YESSSS</button> -->

    </footer>

    <script src="script.js"></script>

</body>
</html>
