<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Favors PH 🧸</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div id="header_box">
            <p id="header_cap">All rights reserved © 2026</p>
            <img id="headerLogo" src="img/icon/headerLogo.gif">
        </div>
        <!-- <div class="cart">
            🛒 <span id="cart-count">0</span> items - $<span id="cart-total">0</span>
        </div> -->
        <!-- <button id="toggleViewBtn" class="view-toggle">Mobile View</button> -->
    </header>

    <!-- BEST SELLING SECTION -->
    <!-- BEST SELLING SECTION -->
    <!-- BEST SELLING SECTION -->
    <p id="bs_prod" onclick="window.scrollTo({top: 0, behavior: 'smooth'});"></p>
    <div id="bestSelling" class="bestSelling"></div>


    <!-- PRICE FILTER SECTION -->
    <!-- PRICE FILTER SECTION -->
    <!-- PRICE FILTER SECTION -->
    <section class="priceSearch" onclick="window.scrollTo({top: 335, behavior: 'smooth'});" style="cursor: pointer;">
        <label for="minPrice">Min Price: </label>
        <input type="number" id="minPrice" min="0" placeholder="0" style="width:210px; height: 5px; font-size: 16px;">
        <label for="maxPrice">Max Price: </label>
        <input type="number" id="maxPrice" min="0" placeholder="Any" style="width:150px; height: 5px; font-size: 16px;">
        <button id="priceFilterBtn" style="border-radius:10px;">Filter</button>
    </section>


    <!-- CATEGORY FILTER SECTION -->
    <!-- CATEGORY FILTER SECTION -->
    <!-- CATEGORY FILTER SECTION -->
    <section class="controls" onclick="window.scrollTo({top: 335, behavior: 'smooth'});" style="cursor: pointer;">
        <input type="text" id="search" placeholder="Search cute things..." style="height: 5px; font-size: 16px;">
        <div id="filters" class="filters"></div>
    </section>


    <!-- PRODUCTS SECTION -->
    <!-- PRODUCTS SECTION -->
    <!-- PRODUCTS SECTION -->
    <section id="products" class="products"></section>


    <!-- FOOTER SECTION -->
    <!-- FOOTER SECTION -->
    <!-- FOOTER SECTION -->
    <footer>

        <p style="font-style: italic; font-size: small; margin-bottom: 2px;">Party Favors | Souvenirs | Gifts</p>
        <div>Made with 💖 for cute souvenir lovers</div>

        <a href="https://www.facebook.com/Simplyfavorsph/" target="_blank">
            <img id="fb_link" src="img/icon/fblogo.png">
        </a>

        <a href="https://www.instagram.com/simplyfavorsph" target="_blank">
            <img id="ig_link" src="img/icon/instalogo.png">
        </a>

        </a>
        <a href="https://www.tiktok.com/@simplyfavorsph" target="_blank">
            <img id="tik_link" src="img/icon/tiklogo.png">
        </a>
        <br>
        <img src="img/icon/pic2.png" alt="logo" style="width: 110px; border-radius: 10px; margin-top: 10px;">

    <script src="script.js"></script>
