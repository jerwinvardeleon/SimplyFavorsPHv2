<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Favors PH</title>
    <link rel="stylesheet" href="style_landing.css">
</head>

<body>
    <header>
        <div id="header_box">
            <!-- <p id="header_cap">All rights reserved © 2026</p> -->
            <img id="headerLogo" src="img/icon/headerLogo2.gif" alt="Simply Favors PH">
        </div>
    </header>

    <main class="landing_main">
        <nav class="landing_nav" aria-label="Site sections">

            <a class="landing_card card_shop" href="shop.html">
                <div class="card_icon_wrap">
                    <img class="card_icon" src="img/icon/icon_shop.png" alt="Shop icon">
                </div>
                <div class="card_copy">
                    <span class="card_label">Shop Now</span>
                    <p>Go straight to browse our list of products.</p>
                </div>
            </a>

            <a class="landing_card card_album" href="album.html">
                <div class="card_icon_wrap">
                    <img class="card_icon" src="img/icon/icon_album.png" alt="Album icon">
                </div>
                <div class="card_copy">
                    <span class="card_label">View Gallery</span>
                    <p>See actual photos of our products and events.</p>
                </div>
            </a>

            <a class="landing_card card_reviews" href="reviews.html">
                <div class="card_icon_wrap">
                    <img class="card_icon" src="img/icon/icon_review.png" alt="Reviews icon">
                </div>
                <div class="card_copy">
                    <span class="card_label">Read Reviews</span>
                    <p>See reviews and feedbacks from our customers.</p>
                </div>
            </a>
        </nav>
    </main>

            <br>
            <p class="hero_cap">Visit Us on our social media pages</p>

            <div class="social_row">
                <a href="https://www.facebook.com/Simplyfavorsph/" target="_blank">
                    <img id="fb_link" src="img/icon/fblogo.png">
                </a>

                <a href="https://www.instagram.com/simplyfavorsph" target="_blank">
                    <img id="ig_link" src="img/icon/instalogo.png">
                </a>

                <a href="https://www.tiktok.com/@simplyfavorsph" target="_blank">
                    <img id="tik_link" src="img/icon/tiklogo.png">
                </a>
                
            </div>
            
    <p id="header_cap">All rights reserved © 2026</p>
    <p style="color: var(--brown);font-style: italic; text-align: center; font-size: xx-small; margin-top: 0px;">version
        4.01.03</p>
</body>

</html>
