<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Favors PH Reviews</title>
    <link rel="stylesheet" href="style_reviews.css">
</head>

<body>
    <header>
        <div id="header_box">
            <img id="headerLogo" src="img/icon/headerLogo2.gif" alt="Simply Favors PH">
        </div>
    </header>

    <main class="gallery_main">
        <section class="gallery_intro">
            <a class="back_link" href="landing.html"> ← Back to Home Page</a>
            <!-- <h1>Reviews</h1> -->
            <!-- <p>All images from the reviews gallery will appear here.</p> -->
        </section>

        <section id="gallery_grid" class="gallery_grid" aria-live="polite"></section>
    </main>

    <script>
        const imageBasePath = 'img/reviews/';
        const imageManifestPath = `${imageBasePath}manifest.json`;
        const galleryGrid = document.getElementById('gallery_grid');
        const imageExtPattern = /\.(jpg|jpeg|png|gif|webp|avif|bmp)$/i;
        let currentLightbox = null;

        function closeLightbox() {
            if (!currentLightbox) return;
            currentLightbox.remove();
            currentLightbox = null;
        }

        function toggleLightbox(src, alt) {
            if (currentLightbox) {
                closeLightbox();
                return;
            }

            const overlay = document.createElement('div');
            overlay.className = 'image_lightbox';

            const expanded = document.createElement('img');
            expanded.src = src;
            expanded.alt = alt;

            expanded.addEventListener('click', closeLightbox);
            overlay.addEventListener('click', (event) => {
                if (event.target === overlay) closeLightbox();
            });

            overlay.appendChild(expanded);
            document.body.appendChild(overlay);
            currentLightbox = overlay;
        }

        function renderGallery(imageFiles) {
            galleryGrid.innerHTML = '';

            if (imageFiles.length === 0) {
                galleryGrid.innerHTML = '<div class="empty_state">No photos found in img/reviews yet.</div>';
                return;
            }

            imageFiles.forEach(fileName => {
                const card = document.createElement('figure');
                card.className = 'gallery_card';

                const image = document.createElement('img');
                image.src = `${imageBasePath}${fileName}`;
                image.alt = fileName;
                image.loading = 'lazy';
                image.addEventListener('click', () => toggleLightbox(image.src, image.alt));

                card.appendChild(image);
                galleryGrid.appendChild(card);
            });
        }

        async function loadImageFiles() {
            try {
                const response = await fetch(imageBasePath, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('Reviews folder is not listable by this server.');
                }

                const directoryHtml = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(directoryHtml, 'text/html');

                const imageFiles = [...doc.querySelectorAll('a[href]')]
                    .map(link => link.getAttribute('href') || '')
                    .map(href => href.split('?')[0].split('#')[0])
                    .map(href => href.replace(/\\/g, '/'))
                    .map(href => decodeURIComponent(href))
                    .map(href => href.endsWith('/') ? '' : href)
                    .filter(Boolean)
                    .map(href => href.split('/').pop())
                    .filter(name => imageExtPattern.test(name));

                const uniqueSorted = [...new Set(imageFiles)].sort((a, b) => b.localeCompare(a));
                renderGallery(uniqueSorted);
            } catch (error) {
                console.warn('Directory listing unavailable. Trying manifest fallback...', error);

                try {
                    const manifestResponse = await fetch(imageManifestPath, { cache: 'no-store' });
                    if (!manifestResponse.ok) {
                        throw new Error('manifest.json not found.');
                    }

                    const manifest = await manifestResponse.json();
                    const fromManifest = Array.isArray(manifest)
                        ? manifest
                        : Array.isArray(manifest.images)
                            ? manifest.images
                            : [];

                    const imageFiles = fromManifest
                        .map(name => String(name || '').trim())
                        .filter(name => name && imageExtPattern.test(name));

                    const uniqueSorted = [...new Set(imageFiles)].sort((a, b) => b.localeCompare(a));
                    renderGallery(uniqueSorted);
                } catch (manifestError) {
                    galleryGrid.innerHTML = '<div class="empty_state">Unable to load reviews automatically. Add image names to img/reviews/manifest.json or enable directory listing.</div>';
                    console.error(manifestError);
                }
            }
        }

        loadImageFiles();
    </script>
    <p id="header_cap">All rights reserved © 2026</p>
</body>

</html>
