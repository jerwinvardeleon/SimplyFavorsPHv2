<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Form</title>
    <style>
        :root {
            --pink: #f3ebde;
            --peach: #ffc6a8;
            --cream: #fff5ec;
            --brown: #5a3e36;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: Arial, sans-serif;
            background: linear-gradient(100deg, var(--pink), var(--peach));
            color: var(--brown);
        }

        #form_card {
            background: var(--cream);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin: 0 0 6px 0;
            font-size: 22px;
        }

        #subtext {
            margin: 0 0 16px 0;
            font-size: 14px;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        .field input,
        .field textarea {
            width: 100%;
            border: 1px solid #d7c9bf;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }

        .field textarea {
            min-height: 72px;
            resize: vertical;
        }

        .field-error {
            display: none;
            margin-top: 6px;
            color: #c62828;
            font-size: 12px;
        }

        #actions {
            margin-top: 8px;
            display: flex;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        #proceed_btn {
            flex: 1;
            background: #ebbd41;
            color: #2f231f;
        }

        #back_btn {
            width: 100px;
            background: #5c4e4a9a;
            color: #fff;
        }

        #footer_img {
            margin-top: 16px;
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div id="form_card">
        <h2>Thank you for choosing Simply Favors!</h2>
        <p id="subtext">Kindly fill up the form below to complete your order</p>

        <form id="order_form">
            <div class="field">
                <label for="customer_name">Customer Name:</label>
                <input id="customer_name" type="text" required>
            </div>

            <div class="field">
                <label for="celebrant_name">Celebrant's Name:</label>
                <input id="celebrant_name" type="text" required>
            </div>

            <div class="field">
                <label for="event_date">Date of Event:</label>
                <input id="event_date" type="date" required>
                    <p id="event_date_warning" class="field-error" style="display: none;">For orders that require delivery within 14 days from today, please send us a message to confirm availability.</p>
            </div>

            <div class="field">
                <label for="event_theme">Event Theme / Layout instruction (ex: Safari theme / Kahel's 1st Birthday)</label>
                <textarea id="event_theme" required></textarea>
            </div>

            <div class="field">
                <label for="contact_number">Contact Number:</label>
                <input id="contact_number" type="text" required>
                <p id="contact_number_error" class="field-error"></p>
            </div>

            <div class="field">
                <label for="delivery_address">Delivery Address:</label>
                <textarea id="delivery_address" required></textarea>
            </div>

            <div id="actions">
                <button id="proceed_btn" type="submit">Proceed to Summary</button>
                <button id="back_btn" type="button" onclick="window.close()">Back</button>
            </div>
        </form>
    </div>

    <img id="footer_img" src="img/icon/pic2.png" alt="Simply Favors footer image">

    <script>
        const orderForm = document.getElementById('order_form');
        const eventDateInput = document.getElementById('event_date');
        const eventDateWarning = document.getElementById('event_date_warning');
        const contactNumberInput = document.getElementById('contact_number');
        const contactNumberError = document.getElementById('contact_number_error');

        function getTomorrowDateString() {
            const tomorrow = new Date();
            tomorrow.setHours(0, 0, 0, 0);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const year = tomorrow.getFullYear();
            const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
            const day = String(tomorrow.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDaysFromToday(dateValue) {
            if (!dateValue) {
                return null;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const selectedDate = new Date(`${dateValue}T00:00:00`);
            const msPerDay = 1000 * 60 * 60 * 24;
            return Math.ceil((selectedDate - today) / msPerDay);
        }

        function enforceEventDateMinimum() {
            const minDate = getTomorrowDateString();
            eventDateInput.min = minDate;

            if (eventDateInput.value && eventDateInput.value < minDate) {
                eventDateInput.value = '';
            }

            const days = getDaysFromToday(eventDateInput.value);
            const isWithinSevenDays = days !== null && days >= 0 && days < 14;
            eventDateWarning.style.display = isWithinSevenDays ? 'block' : 'none';
        }

        eventDateInput.addEventListener('focus', enforceEventDateMinimum);
        eventDateInput.addEventListener('input', enforceEventDateMinimum);
        eventDateInput.addEventListener('change', enforceEventDateMinimum);
        enforceEventDateMinimum();

        function showContactNumberError(message) {
            contactNumberError.textContent = message;
            contactNumberError.style.display = 'block';
        }

        function clearContactNumberError() {
            contactNumberError.textContent = '';
            contactNumberError.style.display = 'none';
        }

        function validateContactNumber() {
            const value = contactNumberInput.value.trim();

            if (!/^\d+$/.test(value)) {
                showContactNumberError('Only digits are allowed.');
                return false;
            }

            if (value.length !== 11) {
                showContactNumberError('Contact number must be exactly 11 digits.');
                return false;
            }

            clearContactNumberError();
            return true;
        }

        contactNumberInput.addEventListener('input', clearContactNumberError);

        orderForm.addEventListener('submit', function (event) {
            event.preventDefault();
            enforceEventDateMinimum();

            if (!eventDateInput.value) {
                eventDateInput.reportValidity();
                return;
            }

            const daysUntilEvent = getDaysFromToday(eventDateInput.value);
            if (daysUntilEvent !== null && daysUntilEvent >= 0 && daysUntilEvent < 14) {
                eventDateWarning.style.display = 'block';
                eventDateInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            if (!validateContactNumber()) {
                return;
            }

            const orderFormData = {
                customerName: document.getElementById('customer_name').value.trim(),
                celebrantName: document.getElementById('celebrant_name').value.trim(),
                eventDate: eventDateInput.value,
                eventTheme: document.getElementById('event_theme').value.trim(),
                contactNumber: document.getElementById('contact_number').value.trim(),
                deliveryAddress: document.getElementById('delivery_address').value.trim()
            };

            localStorage.setItem('orderFormData', JSON.stringify(orderFormData));
            window.location.href = 'checkout-popup.html';
        });
    </script>
</body>

</html>
